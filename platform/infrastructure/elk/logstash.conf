input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
  }
}

filter {
  if [type] == "kong" {
    json {
      source => "message"
    }
    mutate {
      add_field => { "service" => "kong-gateway" }
    }
  }
  
  if [type] == "auth-service" or [type] == "admin-service" or [type] == "product-service" or [type] == "order-service" or [type] == "cart-service" {
    json {
      source => "message"
    }
  }
  
  # Parse timestamp
  date {
    match => [ "timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss" ]
    target => "@timestamp"
  }
  
  # Add service type
  if [logger] {
    mutate {
      add_field => { "service_type" => "golang" }
    }
  }
  
  # Clean up fields
  mutate {
    remove_field => [ "message", "host", "ecs", "agent", "input" ]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "garlic-%{+YYYY.MM.dd}"
  }
}
