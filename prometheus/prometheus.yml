global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'garlic-ecommerce'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  # ===========================================
  # PROMETHEUS SELF-MONITORING
  # ===========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ===========================================
  # KONG GATEWAY
  # ===========================================
  - job_name: 'kong'
    static_configs:
      - targets: ['kong:8001']
    metrics_path: '/metrics'

  # ===========================================
  # EUREKA SERVER
  # ===========================================
  - job_name: 'eureka-server'
    static_configs:
      - targets: ['eureka-server:8761']
    metrics_path: '/actuator/prometheus'

  # ===========================================
  # CONFIG SERVER
  # ===========================================
  - job_name: 'config-server'
    static_configs:
      - targets: ['config-server:8888']
    metrics_path: '/actuator/prometheus'

  # ===========================================
  # AUTH SERVICE
  # ===========================================
  - job_name: 'auth-service'
    static_configs:
      - targets: ['auth-service:8081']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # ===========================================
  # PRODUCT SERVICE
  # ===========================================
  - job_name: 'product-service'
    static_configs:
      - targets: ['product-service:8082']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # ===========================================
  # ORDER SERVICE
  # ===========================================
  - job_name: 'order-service'
    static_configs:
      - targets: ['order-service:8083']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # ===========================================
  # INVENTORY SERVICE
  # ===========================================
  - job_name: 'inventory-service'
    static_configs:
      - targets: ['inventory-service:8084']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # ===========================================
  # PAYMENT SERVICE
  # ===========================================
  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:8085']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # ===========================================
  # SEARCH SERVICE
  # ===========================================
  - job_name: 'search-service'
    static_configs:
      - targets: ['search-service:8086']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # ===========================================
  # NOTIFICATION SERVICE
  # ===========================================
  - job_name: 'notification-service'
    static_configs:
      - targets: ['notification-service:8087']
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s

  # ===========================================
  # KAFKA METRICS (JMX)
  # ===========================================
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-1:7071', 'kafka-2:7071', 'kafka-3:7071']
    metrics_path: '/metrics'

  # ===========================================
  # POSTGRESQL METRICS (PG_EXPORTER)
  # ===========================================
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ===========================================
  # REDIS METRICS (REDIS_EXPORTER)
  # ===========================================
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # ===========================================
  # NODE EXPORTER (SYSTEM)
  # ===========================================
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
