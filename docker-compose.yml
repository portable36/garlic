services:
  # ===========================================
  # KONG API GATEWAY
  # ===========================================
  kong:
    image: kong:3.4
    container_name: garlic-kong
    restart: unless-stopped
    ports:
      - "${KONG_HTTP_PORT}:8000"
      - "${KONG_HTTPS_PORT}:8443"
      - "8001:8001"
      - "8443:8443"
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres-kong
      KONG_PG_PORT: 5432
      KONG_PG_USER: garlic
      KONG_PG_PASSWORD: ${KONG_DATABASE_PASSWORD}
      KONG_PG_DATABASE: kong
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_PLUGINS: jwt,rate-limiting,cors,prometheus,http-log
    volumes:
      - ./kong/kong.yml:/usr/local/kong/declarative/kong.yml:ro
    depends_on:
      postgres-kong:
        condition: service_healthy
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Konga Dashboard
  konga:
    image: pantsel/konga:latest
    container_name: garlic-konga
    restart: unless-stopped
    ports:
      - "${KONGA_PORT}:1337"
    environment:
      DB_ADAPTER: postgres
      DB_HOST: postgres-kong
      DB_PORT: 5432
      DB_USER: garlic
      DB_PASSWORD: ${KONG_DATABASE_PASSWORD}
      DB_DATABASE: konga
      NODE_ENV: development
    depends_on:
      postgres-kong:
        condition: service_healthy
    networks:
      - garlic-network

  # Kong Database
  postgres-kong:
    image: postgres:16-alpine
    container_name: garlic-postgres-kong
    restart: unless-stopped
    ports:
      - "5431:5432"
    environment:
      POSTGRES_USER: garlic
      POSTGRES_PASSWORD: ${KONG_DATABASE_PASSWORD}
      POSTGRES_DB: kong
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garlic -d kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # EUREKA SERVICE REGISTRY
  # ===========================================
  eureka-server:
    image: garlic-eureka:latest
    container_name: garlic-eureka
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${EUREKA_PORT}:${EUREKA_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: ${EUREKA_PORT}
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      EUREKA_CLIENT_REGISTER_WITH_EUREKA: false
      EUREKA_CLIENT_FETCH_REGISTRY: false
      EUREKA_SERVER_ENABLE_SELF_PRESERVATION: false
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # CONFIG SERVER
  # ===========================================
  config-server:
    image: garlic-config:latest
    container_name: garlic-config
    build:
      context: ./config-server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${CONFIG_SERVER_PORT}:${CONFIG_SERVER_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: ${CONFIG_SERVER_PORT}
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: https://github.com/garlic-config/config-repo
      SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL: main
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:${EUREKA_PORT}/eureka/
    depends_on:
      - eureka-server
      - postgres-config
    networks:
      - garlic-network

  # ===========================================
  # DATABASES - One per Service
  # ===========================================
  postgres-auth:
    image: postgres:16-alpine
    container_name: garlic-postgres-auth
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: garlic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_AUTH}
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garlic"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-product:
    image: postgres:16-alpine
    container_name: garlic-postgres-product
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: garlic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_PRODUCT}
    volumes:
      - postgres-product-data:/var/lib/postgresql/data
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garlic"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:16-alpine
    container_name: garlic-postgres-order
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: garlic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_ORDER}
    volumes:
      - postgres-order-data:/var/lib/postgresql/data
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garlic"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-inventory:
    image: postgres:16-alpine
    container_name: garlic-postgres-inventory
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: garlic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_INVENTORY}
    volumes:
      - postgres-inventory-data:/var/lib/postgresql/data
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garlic"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16-alpine
    container_name: garlic-postgres-payment
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: garlic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_PAYMENT}
    volumes:
      - postgres-payment-data:/var/lib/postgresql/data
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garlic"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-search:
    image: postgres:16-alpine
    container_name: garlic-postgres-search
    restart: unless-stopped
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: garlic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_SEARCH}
    volumes:
      - postgres-search-data:/var/lib/postgresql/data
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garlic"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:16-alpine
    container_name: garlic-postgres-notification
    restart: unless-stopped
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: garlic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_NOTIFICATION}
    volumes:
      - postgres-notification-data:/var/lib/postgresql/data
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garlic"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-config:
    image: postgres:16-alpine
    container_name: garlic-postgres-config
    restart: unless-stopped
    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: garlic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DB_CONFIG}
    volumes:
      - postgres-config-data:/var/lib/postgresql/data
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garlic"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # REDIS (Shared Cache)
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: garlic-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # KAFKA CLUSTER
  # ===========================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: garlic-zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_ADMIN_SERVER_PORT: 8080
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_DATA_DIR: /var/lib/zookeeper/data
      ZOOKEEPER_LOG_DIR: /var/lib/zookeeper/log
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-1:
    image: confluentinc/cp-kafka:7.5.0
    container_name: garlic-kafka-1
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 3
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka-1-data:/var/lib/kafka/data
    networks:
      - garlic-network

  kafka-2:
    image: confluentinc/cp-kafka:7.5.0
    container_name: garlic-kafka-2
    restart: unless-stopped
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29093,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka-2-data:/var/lib/kafka/data
    networks:
      - garlic-network

  kafka-3:
    image: confluentinc/cp-kafka:7.5.0
    container_name: garlic-kafka-3
    restart: unless-stopped
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29094,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka-3-data:/var/lib/kafka/data
    networks:
      - garlic-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: garlic-kafka-ui
    restart: unless-stopped
    ports:
      - "8089:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: garlic-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
      - zookeeper
    networks:
      - garlic-network

  # ===========================================
  # ELASTICSEARCH
  # ===========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: garlic-elasticsearch
    restart: unless-stopped
    ports:
      - "${ELASTICSEARCH_PORT}:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ===========================================
  # LOGGING - ELK STACK
  # ===========================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: garlic-logstash
    restart: unless-stopped
    ports:
      - "${LOGSTASH_PORT}:5044"
      - "9600:9600"
    environment:
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      LOGSTASH_INTERNAL_PASSWORD: ${ELASTICSEARCH_PASSWORD}
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - garlic-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: garlic-kibana
    restart: unless-stopped
    ports:
      - "${KIBANA_PORT}:5601"
    environment:
      ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      KIBANA_PASSWORD: ${KIBANA_PASSWORD}
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - garlic-network

  # ===========================================
  # OBSERVABILITY - PROMETHEUS + GRAFANA + JAEGER
  # ===========================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: garlic-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - garlic-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.2.2
    container_name: garlic-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - garlic-network

  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: garlic-jaeger
    restart: unless-stopped
    ports:
      - "${JAEGER_PORT}:16686"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "14268:14268"
      - "14250:14250"
    environment:
      COLLECTOR_OTLP_ENABLED: true
      SPAN_STORAGE_TYPE: elasticsearch
      ES_SERVER_URLS: http://elasticsearch:9200
      ES_USERNAME: elastic
      ES_PASSWORD: ${ELASTICSEARCH_PASSWORD}
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - garlic-network

  # ===========================================
  # MICROSERVICES (Development Mode)
  # ===========================================
  auth-service:
    image: garlic-auth:latest
    container_name: garlic-auth
    build:
      context: ./auth
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: ${AUTH_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/${DB_AUTH}
      SPRING_DATASOURCE_USERNAME: garlic
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:${EUREKA_PORT}/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:${CONFIG_SERVER_PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
    depends_on:
      postgres-auth:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - garlic-network

  product-service:
    image: garlic-product:latest
    container_name: garlic-product
    build:
      context: ./product
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PRODUCT_PORT}:${PRODUCT_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: ${PRODUCT_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-product:5432/${DB_PRODUCT}
      SPRING_DATASOURCE_USERNAME: garlic
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:${EUREKA_PORT}/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:${CONFIG_SERVER_PORT}
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
    depends_on:
      postgres-product:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - garlic-network

  order-service:
    image: garlic-order:latest
    container_name: garlic-order
    build:
      context: ./order
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${ORDER_PORT}:${ORDER_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: ${ORDER_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-order:5432/${DB_ORDER}
      SPRING_DATASOURCE_USERNAME: garlic
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:${EUREKA_PORT}/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:${CONFIG_SERVER_PORT}
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
    depends_on:
      postgres-order:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - garlic-network

  inventory-service:
    image: garlic-inventory:latest
    container_name: garlic-inventory
    build:
      context: ./inventory
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${INVENTORY_PORT}:${INVENTORY_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: ${INVENTORY_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-inventory:5432/${DB_INVENTORY}
      SPRING_DATASOURCE_USERNAME: garlic
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:${EUREKA_PORT}/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:${CONFIG_SERVER_PORT}
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
    depends_on:
      postgres-inventory:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - garlic-network

  payment-service:
    image: garlic-payment:latest
    container_name: garlic-payment
    build:
      context: ./payment
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${PAYMENT_PORT}:${PAYMENT_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: ${PAYMENT_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payment:5432/${DB_PAYMENT}
      SPRING_DATASOURCE_USERNAME: garlic
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:${EUREKA_PORT}/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:${CONFIG_SERVER_PORT}
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
    depends_on:
      postgres-payment:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - garlic-network

  search-service:
    image: garlic-search:latest
    container_name: garlic-search
    build:
      context: ./search
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${SEARCH_PORT}:${SEARCH_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: ${SEARCH_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-search:5432/${DB_SEARCH}
      SPRING_DATASOURCE_USERNAME: garlic
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_ELASTICSEARCH_USERNAME: elastic
      SPRING_ELASTICSEARCH_PASSWORD: ${ELASTICSEARCH_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:${EUREKA_PORT}/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:${CONFIG_SERVER_PORT}
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
    depends_on:
      postgres-search:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - garlic-network

  notification-service:
    image: garlic-notification:latest
    container_name: garlic-notification
    build:
      context: ./notification
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${NOTIFICATION_PORT}:${NOTIFICATION_PORT}"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: ${NOTIFICATION_PORT}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notification:5432/${DB_NOTIFICATION}
      SPRING_DATASOURCE_USERNAME: garlic
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:${EUREKA_PORT}/eureka/
      SPRING_CLOUD_CONFIG_URI: http://config-server:${CONFIG_SERVER_PORT}
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29093,kafka-3:29094
    depends_on:
      postgres-notification:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - garlic-network

# ===========================================
# NETWORKS
# ===========================================
networks:
  garlic-network:
    driver: bridge
    name: garlic-network

# ===========================================
# VOLUMES
# ===========================================
volumes:
  # PostgreSQL
  kong-db-data:
  postgres-auth-data:
  postgres-product-data:
  postgres-order-data:
  postgres-inventory-data:
  postgres-payment-data:
  postgres-search-data:
  postgres-notification-data:
  postgres-config-data:

  # Redis
  redis-data:

  # Kafka
  zookeeper-data:
  zookeeper-log:
  kafka-1-data:
  kafka-2-data:
  kafka-3-data:

  # Elasticsearch
  elasticsearch-data:

  # Observability
  prometheus-data:
  grafana-data:
