input {
  # Kong access logs via http plugin
  http {
    port => 5044
    codec => json
  }

  # Filebeat input for microservices
  beats {
    port => 5045
  }
}

filter {
  # Parse JSON from Kong
  if [headers] {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Add metadata
  mutate {
    add_field => {
      "service_name" => "%{parsed.service}"
      "environment" => "development"
      "cluster" => "garlic-ecommerce"
    }
  }

  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss"]
    target => "@timestamp"
  }

  # GeoIP for client IP (if available)
  geoip {
    source => "client_ip"
    target => "geoip"
  }

  # User agent parsing
  useragent {
    source => "user_agent"
    target => "ua"
  }

  # Add Kong specific fields
  if [request_uri] {
    mutate {
      add_field => {
        "endpoint" => "%{request_uri}"
        "method" => "%{request_method}"
      }
    }
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "garlic-logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "${ELASTICSEARCH_PASSWORD}"
    document_type => "_doc"
  }

  # Also output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
